<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigator SK Mawar Sandakan</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 15px; background-color: #f4f7f6; color: #333; margin: 0; }
        .header { background-color: #004d40; color: white; padding: 20px; border-radius: 0 0 20px 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-size: 22px; }
        .header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }
        .tingkat-badge { background-color: #e0f2f1; color: #004d40; padding: 8px 15px; font-size: 14px; font-weight: bold; border-radius: 20px; display: inline-block; margin-top: 10px; border: 1px solid #00796b; }
        .btn { display: block; width: 92%; max-width: 360px; margin: 8px auto; padding: 12px; font-size: 15px; font-weight: bold; color: white; background-color: #00796b; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 5px rgba(0,0,0,0.1); text-align: left; padding-left: 18px; }
        .btn:hover { background-color: #004d40; }
        .section-title { font-size: 15px; font-weight: bold; margin-top: 20px; color: #004d40; text-align: left; max-width: 360px; margin-left: auto; margin-right: auto; padding-left: 10px; border-left: 4px solid #00796b; }
        img { width: 100%; max-width: 450px; display: none; margin: 15px auto; border: 3px solid #00796b; border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        #loading { display: none; font-weight: bold; color: #00796b; margin-top: 15px; font-size: 16px; }
        .map-container { padding: 0 10px; margin-top: 20px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>NAVIGATOR SK MAWAR</h2>
        <p>Sila pilih bilik destinasi untuk panduan laluan</p>
    </div>

    <!-- TINGKAT BAWAH -->
    <div class="section-title">🛑 TINGKAT BAWAH</div>
    <button class="btn" onclick="tunjukLaluan('KANTIN')">🍽️ KANTIN</button>
    <button class="btn" onclick="tunjukLaluan('bilik_kesihatan')">🏥 BILIK KESIHATAN</button>
    <button class="btn" onclick="tunjukLaluan('bilik_sains')">🔬 BILIK SAINS</button>
    <button class="btn" onclick="tunjukLaluan('bilik_spbt')">📚 BILIK SPBT (Buku Teks)</button>
    <button class="btn" onclick="tunjukLaluan('surau')">🕌 SURAU</button>
    <button class="btn" onclick="tunjukLaluan('kelas_6_pintar')">🚪 KELAS 6 PINTAR</button>

    <!-- LANTAI 1 -->
    <div class="section-title">🏢 LANTAI 1</div>
    <button class="btn" onclick="tunjukLaluan('pejabat')">🏛️ PEJABAT</button>
    <button class="btn" onclick="tunjukLaluan('bilik_ict')">💻 BILIK ICT</button>
    <button class="btn" onclick="tunjukLaluan('bilik_mesyuarat')">👥 BILIK MESYUARAT</button>
    <button class="btn" onclick="tunjukLaluan('bilik_pemulihan')">✏️ BILIK PEMULIHAN</button>
    <button class="btn" onclick="tunjukLaluan('kelas_1_genius')">🚪 KELAS 1 GENIUS</button>
    <button class="btn" onclick="tunjukLaluan('kelas_1_intelek')">🚪 KELAS 1 INTELEK</button>
    <button class="btn" onclick="tunjukLaluan('kelas_1_pintar')">🚪 KELAS 1 PINTAR</button>
    <button class="btn" onclick="tunjukLaluan('kelas_3_intelek')">🚪 KELAS 3 INTELEK</button>

    <!-- LANTAI 2 -->
    <div class="section-title">🏢 LANTAI 2</div>
    <button class="btn" onclick="tunjukLaluan('bilik_guru')">👥 BILIK GURU</button>
    <button class="btn" onclick="tunjukLaluan('kelas_tahun_2')">🚪 KELAS TAHUN 2</button>
    <button class="btn" onclick="tunjukLaluan('kelas_tahun_3_genius')">🚪 KELAS TAHUN 3 GENIUS</button>
    <button class="btn" onclick="tunjukLaluan('kelas_tahun_4')">🚪 KELAS TAHUN 4</button>
    <button class="btn" onclick="tunjukLaluan('kelas_tahun_5')">🚪 KELAS TAHUN 5</button>

    <!-- LANTAI 3 -->
    <div class="section-title">🏢 LANTAI 3</div>
    <button class="btn" onclick="tunjukLaluan('pusat_sumber')">📚 PUSAT SUMBER</button>
    <button class="btn" onclick="tunjukLaluan('kelas_tahun_6')">🚪 KELAS TAHUN 6</button>

    <!-- RUANG PAPARAN PETA NAVIGASI -->
    <div class="map-container">
        <p id="loading">🔄 Memuatkan pelan laluan...</p>
        <div id="infoTingkat" class="tingkat-badge" style="display:none;"></div>
        <img id="petaLaluan" src="" alt="Pelan Laluan" onload="selesaiMuat()">
    </div>

    <script>
        function tunjukLaluan(destinasi) {
            var imej = document.getElementById('petaLaluan');
            var loadingText = document.getElementById('loading');
            var infoTingkat = document.getElementById('infoTingkat');
            
            loadingText.style.display = 'block';
            imej.style.display = 'none';
            infoTingkat.style.display = 'none';
            
            // Menggunakan fail imej tempatan GitHub yang sedia ada
            if(destinasi === 'kantin') {
                infoTingkat.innerText = "📍 Lokasi: Tingkat Bawah";
                imej.src = 'LALUAN-KE-KANTIN.png';
            } else if(destinasi === 'bilik_kesihatan') {
                infoTingkat.innerText = "📍 Lokasi: Tingkat Bawah";
                imej.src = 'LANTAI-BAWAH-BILIK-KESIHATAN.png';
            } else if(destinasi === 'bilik_sains') {
                infoTingkat.innerText = "📍 Lokasi: Tingkat Bawah";
                imej.src = 'LANTAI-BAWAH-BILIK-SAINS.png';
            } else if(destinasi === 'bilik_spbt') {
                infoTingkat.innerText = "📍 Lokasi: Tingkat Bawah";
                imej.src = 'LANTAI-BAWAH-BILIK-SPBT.png';
            } else if(destinasi === 'surau') {
                infoTingkat.innerText = "📍 Lokasi: Tingkat Bawah";
                imej.src = 'LANTAI-BAWAH-SURAU.png';
            } else if(destinasi === 'kelas_6_pintar') {
                infoTingkat.innerText = "📍 Lokasi: Tingkat Bawah";
                imej.src = 'LANTAI-BAWAH-KELAS-6-PINTAR.png';
            } 
            
            else if(destinasi === 'pejabat') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 1 (Sila Naik Tangga)";
                imej.src = 'LANTAI-1-PEJABAT.png';
            } else if(destinasi === 'bilik_ict') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 1 (Sila Naik Tangga)";
                imej.src = 'LANTAI-1-BILIK-ICT.png';
            } else if(destinasi === 'bilik_mesyuarat') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 1 (Sila Naik Tangga)";
                imej.src = 'LANTAI-1-BILIK-MESYUARAT.png';
            } else if(destinasi === 'bilik_pemulihan') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 1 (Sila Naik Tangga)";
                imej.src = 'LANTAI-1-BILIK-PEMULIHAN.png';
            } else if(destinasi === 'kelas_1_genius') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 1 (Sila Naik Tangga)";
                imej.src = 'LANTAI-1-KELAS-1-GENIUS.png';
            } else if(destinasi === 'kelas_1_intelek') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 1 (Sila Naik Tangga)";
                imej.src = 'LANTAI-1-KELAS-1-INTELEK.png';
            } else if(destinasi === 'kelas_1_pintar') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 1 (Sila Naik Tangga)";
                imej.src = 'LANTAI-1-KELAS-1-PINTAR.png';
            } else if(destinasi === 'kelas_3_intelek') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 1 (Sila Naik Tangga)";
                imej.src = 'LANTAI-1-KELAS-3-INTELEK.png';
            } 
            
            else if(destinasi === 'bilik_guru') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 2 (Sila Naik Tangga)";
                imej.src = 'LANTAI-2-BILIK-GURU.png';
            } else if(destinasi === 'kelas_tahun_2') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 2 (Sila Naik Tangga)";
                imej.src = 'LANTAI-2-KELAS-TAHUN-2.png';
            } else if(destinasi === 'kelas_tahun_3_genius') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 2 (Sila Naik Tangga)";
                imej.src = 'LANTAI-2-KELAS-TAHUN-3-GENIUS.png';
            } else if(destinasi === 'kelas_tahun_4') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 2 (Sila Naik Tangga)";
                imej.src = 'LANTAI-2-KELAS-TAHUN-4.png';
            } else if(destinasi === 'kelas_tahun_5') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 2 (Sila Naik Tangga)";
                imej.src = 'LANTAI-2-KELAS-TAHUN-5.png';
            } 
            
            else if(destinasi === 'pusat_sumber') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 3 (Tingkat Atas Sekali)";
                imej.src = 'LANTAI-3-PUSAT-SUMBER.png';
            } else if(destinasi === 'kelas_tahun_6') {
                infoTingkat.innerText = "📍 Lokasi: Lantai 3 (Tingkat Atas Sekali)";
                imej.src = 'LANTAI-3-TAHUN-6.png';
            }
            
            // Skrol automatik ke imej pelan
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function selesaiMuat() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('infoTingkat').style.display = 'inline-block';
            document.getElementById('petaLaluan').style.display = 'inline-block';
        }
    </script>

</body>
</html>
